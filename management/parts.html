<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js" type="text/javascript"></script>
    <script src="https://raw.github.com/plentz/jquery-maskmoney/master/dist/jquery.maskMoney.min.js" type="text/javascript"></script>
</head>

<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header">
                Lista de Materiais
            </div>
            <div class="card-body">
                <form id="partForm" action="">
                    <div class="d-flex flex-wrap gap-3 align-items-center justify-content-between">
                        <div class="mb-3 col-5">
                            <label for="CodBarras" class="form-label">Codigo de Barras</label>
                            <input type="text" class="form-control" id="CodBarras" name="CodBarras"
                                placeholder="Codigo de Barras">
                        </div>
                        <div class="mb-3 col-5">
                            <label for="Nome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="Nome" name="Nome" placeholder="Nome">
                        </div>
                        <div class="mb-3 col-12">
                            <label for="Descricao" class="form-label">Descrição</label>
                            <textarea class="form-control" id="Descricao" name="Descricao"
                                placeholder="Descrição"></textarea>
                        </div>
                        <div class="mb-3 col-12">
                            <label for="Imagem" class="form-label">Imagem</label>
                            <input type="file" class="form-control" id="Imagem" name="Imagem" accept="image/*">
                            <img id="imagemPreview" src="" alt="Prévia da Imagem" class="mt-3"
                                style="max-width: 200px; display: none;">
                        </div>
                        <div class="mb-3 col-3">
                            <label for="Fornecedor" class="form-label">Fornecedor</label>
                            <input type="text" class="form-control" id="Fornecedor" name="Fornecedor"
                                placeholder="Fornecedor">
                        </div>
                        <div class="mb-3 col-3">
                            <label for="PrecoVenda" class="form-label">Preço Venda</label>
                            <input type="number" class="form-control" id="PrecoVenda" name="PrecoVenda"
                                placeholder="Preço Venda" value="0" step="0.1">
                        </div>
                        <div class="mb-3 col-3">ç
                            <label for="PrecoCompra" class="form-label">Preço Compra</label>
                            <input type="number" class="form-control" id="PrecoCompra" name="PrecoCompra"
                                placeholder="Preço Compra" value="0" step="0.1">
                        </div>
                        <div class="mb-3 col-3">
                            <label for="UnidadeMetro" class="form-label">Uni/Metro</label>
                            <select class="form-select" id="UnidadeMetro" name="UnidadeMetro">
                                <option selected disabled>Selecione</option>
                                <option value="Unidade">Caixa Fechada</option>
                                <option value="Unidade">Unidade</option>
                                <option value="Metro">Metro</option>
                            </select>
                        </div>
                        <div class="mb-3 col-3">
                            <label for="EstoqueMinimo" class="form-label">Estoque Mínimo</label>
                            <input type="number" class="form-control" id="EstoqueMinimo" name="EstoqueMinimo"
                                placeholder="Estoque Mínimo" value="0">
                        </div>
                        <div class="mb-3 col-3">
                            <label for="DataValidade" class="form-label">Data de Validade</label>
                            <input type="date" class="form-control" id="DataValidade" name="DataValidade">
                        </div>

                        <div class="mb-3 col-3">
                            <label for="Categoria" class="form-label">Categoria</label>
                            <select class="form-select" id="Categoria" name="Categoria">
                                <option selected disabled>Selecione uma categoria</option>
                                <option value="papelaria">Papelaria</option>
                                <option value="presentes">Presentes</option>
                                <option value="eletronicos">Eletrônicos</option>
                                <option value="brinquedos">Brinquedos</option>
                                <option value="aviamentos">Aviamentos</option>
                                <option value="cosmeticos">Cosméticos</option>
                                <option value="personalizados">Personalizados</option>
                            </select>
                        </div>

                    </div>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>

                </form>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>

        document.getElementById('Imagem').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    document.getElementById('imagemPreview').src = event.target.result;
                    document.getElementById('imagemPreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('partForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            formData.set('Imagem', document.getElementById('imagemPreview').src);
            const jsonData = JSON.stringify(Object.fromEntries(formData.entries()));
            fetch('/api/part', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: jsonData
            })
                .then(response => response.json())
                .then(data => {
                    console.log('Success:', data);
                    if (data.status === 'success') {
                        alert('Material cadastrado com sucesso!');
                        this.reset();
                    } else {
                        alert('Erro ao cadastrar material: ' + data.message);
                    }
                })
                .catch(error => console.error('Error:', error));
        });

        document.getElementById('partForm').addEventListener('reset', function (e) {
            e.preventDefault();
            document.getElementById('imagemPreview').src = '';
            document.getElementById('imagemPreview').style.display = 'none';
        });

    </script>
</body>

</html>
