<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stationery Shop Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 28px;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .card .value {
            font-size: 32px;
            font-weight: bold;
            color: #3498db;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        th {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: left;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
        }
        
        tr:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Stationery Shop Dashboard</h1>
        </header>
        
        <div class="dashboard-grid">
            <div class="card">
                <h2>Total Products</h2>
                <div class="value">1,250</div>
            </div>
            <div class="card">
                <h2>Total Sales</h2>
                <div class="value">$12,540</div>
            </div>
            <div class="card">
                <h2>Orders Today</h2>
                <div class="value">45</div>
            </div>
            <div class="card">
                <h2>Low Stock Items</h2>
                <div class="value">12</div>
            </div>
        </div>
        
        <h2 style="margin-bottom: 15px;">Recent Orders</h2>
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#001</td>
                    <td>Notebook Pack</td>
                    <td>10</td>
                    <td>$45.00</td>
                    <td>Completed</td>
                </tr>
                <tr>
                    <td>#002</td>
                    <td>Pen Set</td>
                    <td>25</td>
                    <td>$75.50</td>
                    <td>Pending</td>
                </tr>
                <tr>
                    <td>#003</td>
                    <td>Highlighters</td>
                    <td>15</td>
                    <td>$30.00</td>
                    <td>Completed</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
